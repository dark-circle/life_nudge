name: AQI Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore AQI state
        uses: actions/cache@v4
        with:
          path: .aqi_state.json
          key: aqi-state-${{ github.run_id }}
          restore-keys: |
            aqi-state-

      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Check AQI once
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          AQI_CITY: beijing
          AQI_STATE_FILE: .aqi_state.json
        run: PYTHONPATH=src python -m life_nudge --once
